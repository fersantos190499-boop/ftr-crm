// ─── DATE ─────────────────────────────────────────
const TODAY = Math.floor(Date.now() / 86400000) + 25569;
const WK = (() => {
  const d = new Date(),
    sy = new Date(d.getFullYear(), 0, 1);
  return `${d.getFullYear()}-W${String(Math.ceil(((d - sy) / 864e5 + sy.getDay() + 1) / 7)).padStart(2, "0")}`;
})();
const s2d = s => s ? new Date((s - 25569) * 864e5) : null;
const fd = s => {
  if (!s) return "—";
  const d = s2d(s);
  return `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;
};
const fdS = s => {
  if (!s) return "—";
  const d = s2d(s);
  const ms = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  return `${d.getDate()} ${ms[d.getMonth()]}`;
};
const fMes = s => {
  if (!s) return "—";
  const d = s2d(s);
  const ms = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  return `${ms[d.getMonth()]} ${d.getFullYear()}`;
};
const dateStrToSerial = str => {
  const p = str.split("/");
  if (p.length !== 3) return null;
  const d = new Date(+p[2], +p[1] - 1, +p[0]);
  return isNaN(d.getTime()) ? null : Math.floor(d.getTime() / 864e5) + 25569;
};
const weekRange = w => {
  const a = s2d(TODAY + w * 7),
    b = s2d(TODAY + (w + 1) * 7 - 1);
  const ms = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  return `${a.getDate()} ${ms[a.getMonth()]} — ${b.getDate()} ${ms[b.getMonth()]}`;
};

// ─── PROGRAM LOGIC ────────────────────────────────
const MOD_ST = {
  "3 meses": 12,
  "6 meses": 24,
  "6+1 meses": 28,
  "12 meses": 52
};
const MODS = ["3 meses", "6 meses", "6+1 meses", "12 meses"];
const getStFromMod = m => MOD_ST[m] || 12;
const getRW = m => m === "6 meses" ? 23 : m === "6+1 meses" ? 27 : m === "12 meses" ? 50 : 11;
const getOW = (m, sp, st) => {
  const iv = m === "6+1 meses" ? 7 : 6;
  const r = [];
  for (let w = iv; w <= 400; w += iv) if (w > sp && w <= sp + st - 1) r.push(w);
  return r;
};
const getRaces = (c, raceOvr) => {
  const o = raceOvr?.[c.id];
  if (o?.races !== undefined) return o.races;
  if (c.raceDate) return [{
    date: c.raceDate,
    name: c.raceName
  }];
  return [];
};
const calc = (c, raceOvr) => {
  const ff = c.fi + c.st * 7,
    dr = ff - TODAY;
  const el = Math.max(0, TODAY - c.fi),
    tot = c.st * 7;
  const pct = Math.max(0, Math.min(el / tot, 1));
  const sc = Math.max(1, Math.min(Math.floor(el / 7) + 1, c.st));
  const sg = (c.sp || 0) + sc;
  const sem = dr <= 0 ? "⚫" : dr <= 7 ? "🔴" : dr <= 21 ? "🟡" : "🟢";
  const rw = getRW(c.mod),
    ow = getOW(c.mod, c.sp || 0, c.st);
  const isRenNow = sc === rw,
    isRenSoon = sc === rw - 1,
    isOptNow = ow.includes(sg);
  const nextOpt = ow.find(w => w > sg) || null,
    isMensual = sc % 4 === 0;
  const races = getRaces(c, raceOvr);
  const upcomingRaces = races.filter(r => r.date > TODAY).sort((a, b) => a.date - b.date);
  const nextRace = upcomingRaces[0] || null;
  const raceDays = nextRace ? nextRace.date - TODAY : null;
  return {
    ff,
    dr,
    pct,
    sc,
    sg,
    sem,
    rw,
    ow,
    isRenNow,
    isRenSoon,
    isOptNow,
    nextOpt,
    isMensual,
    races,
    nextRace,
    raceDays
  };
};

let notionPageId = null;
async function notionLoad() {
  const res = await fetch("/.netlify/functions/sync", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "load",
      pageId: notionPageId
    })
  });
  if (!res.ok) throw new Error("Sync error " + res.status);
  const result = await res.json();
  if (result.pageId) notionPageId = result.pageId;
  return result.data || null;
}
async function notionSave(appData) {
  const res = await fetch("/.netlify/functions/sync", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "save",
      pageId: notionPageId,
      data: appData
    })
  });
  if (!res.ok) throw new Error("Sync error " + res.status);
  const result = await res.json();
  if (result.pageId) notionPageId = result.pageId;
}

const SK = "ftr_v1";
const DEF = {

};

  SAVING: "saving",
  ERROR: "error"
};
function useStore() {

  const [ready, setReady] = useState(false);
  const [sync, setSync] = useState(SYNC.INIT);

          } catch {
            return null;
          }
        })();
        if (r?.value) {

            ...DEF,
            ...JSON.parse(r.value)

          latestData.current = p;
          if (p.notionPageId) notionPageId = p.notionPageId;
        }
      } catch {}

      setSync(SYNC.LOADING);
      try {
        const nd = await notionLoad();
        if (nd) {
          const m = {
            ...DEF,
            ...nd

          setData(m);
          latestData.current = m;
          try {
            localStorage.setItem(SK, JSON.stringify(m));
          } catch {}
        }
        if (notionPageId) {
          setData(p => {
            const n = {
              ...p,
              notionPageId
            };
            latestData.current = n;
            return n;
          });
        }
        setSync(SYNC.SYNCED);
        setLastSync(new Date());
      } catch (e) {
        console.warn("Notion load:", e.message);
        setSync(SYNC.ERROR);
      }
    })();
  }, []);
  const upd = useCallback(fn => {
    setData(prev => {
      const next = {
        ...prev,
        ...fn(prev)
      };
      latestData.current = next;
      try {
        localStorage.setItem(SK, JSON.stringify(next));
      } catch {}
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSync(SYNC.SAVING);
      saveTimer.current = setTimeout(async () => {
        try {
          await notionSave(latestData.current);
          setSync(SYNC.SYNCED);
          setLastSync(new Date());
        } catch (e) {
          console.warn("Notion save:", e.message);
          setSync(SYNC.ERROR);
        }
      }, 2500);
      return next;
    });
  }, []);
  const forceSync = useCallback(async () => {
    setSync(SYNC.SAVING);
    try {

      setSync(SYNC.SYNCED);
      setLastSync(new Date());
    } catch {
      setSync(SYNC.ERROR);
    }
  }, []);

    const b = new Blob([JSON.stringify(latestData.current, null, 2)], {
      type: "application/json"

}
